front:
  text: 道行般若經序釋道安撰大哉智度萬聖資通咸宗以成也地合日照無法不周不恃不處纍彼有名既外有名亦病無形兩忘玄莫喟然無主此智之紀也夫永壽莫美乎上乾而齊之殤子神偉莫美於凌虛而同之𠉌滯至德莫大乎真人而比之朽種高妙莫大乎世雄而喻之幻夢由此論之亮為衆聖宗矣何者執道御有卑高有差此有為之域耳非據真如遊法性冥然無名也據真如遊法性冥然無名者智度之奧室也名教遠想者智度之蘧廬也然在乎證者莫不𮚪其生無而惶胘存乎邇者莫不忿其蕩冥而誕誹道動必反優劣致殊眩誹不其宜乎不其宜乎要斯法也與進度齊軫逍遙俱遊千行萬定莫不以成衆行得字而智進全名諸法參相成者求之此列也具其經也進咨第一義以為語端退述權便以為談首行無細而不歷數無微而不極言似煩而各有宗義似重而各有主璅見者慶其邇教而悅寤宏哲者望其遠標絶目陟者彌高而不能階涉者彌深而不能測謀者慮不能規尋者度不能盡既窈冥矣真可謂大業淵藪妙矣者哉然凡諭之者考文以微其理者昏其趣者也察句以驗其義者迷其旨者也何則考文則異同每為辭尋句則觸類每為旨為辭則喪其卒成之致為旨則忽其始擬之義矣若率初以要其終或忘文以全其質者則大智玄通居可知也從始發意逮一切智曲成決著八地無染謂之智也故曰遠離也三脫照空四非明有統鑑諸法因後成用藥病雙亡謂之觀也明此二行於三十萬言其如視諸掌乎顛沛草次無起無此也佛泥曰後外國高士抄九十章為道行品桓靈之世朔佛齎詣京師譯為漢文因本順旨轉音如已敬順聖言了不加飾也然經既抄撮合成音投音殊俗異譯人口傳自非三達胡能一一得本緣故乎由是道行頗有首尾隱者古賢論之往往有滯仕行恥此尋求其本到于闐乃得送詣倉垣出為放光品斥重省刪務令婉便若其悉文將過三倍善出無生論空持巧傳譯如是難為繼矣二家所出足令大智煥爾闡幽支讖全本其亦應然何者抄經刪削所害必多委本從聖乃佛之至戒也安不量末學庶幾斯心載詠載玩未墜于地檢其所出事本終始猶令折傷玷缺𭼪然無際假無放光何由解斯經乎永謝先哲所蒙多矣今集所見為解句下始況現首終隱現尾出經見異銓其得否舉本證抄敢增損也幸我同好飾其瑕謫也
