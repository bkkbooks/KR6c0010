  - {type: variant, offset: 2486, length: 94, content: 波羅蜜尼＝尼蜜【三】【宮】蜜尼【大】，尼蜜【宋】【元】【明】【宮】蜜尼尼蜜和耶拔致天上諸天人，持天華、名香、搗香、澤香、雜香、燒香、天繒、華蓋、幢幡、伎樂，持用供養娛樂佛。供養已，皆白佛言：「極大施，天中天！菩薩摩訶薩漚惒拘舍羅乃作是施，極大尊之功德。何以故？是菩薩摩訶薩學般若波羅蜜，於中勸助故, 聖: ''}
